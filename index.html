<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบยิงพัสดุ</title>
    <!-- โหลด Tailwind CSS สำหรับการตกแต่ง -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ซ่อนเมนูตั้งค่าตอนเริ่มต้น */
        .hidden-panel { display: none; }
        /* อนิเมชั่นหมุนโหลด */
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        /* ปรับแต่ง Scrollbar สำหรับรายการที่ยาว */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[95vh]">
        
        <!-- Header -->
        <div class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md relative z-10 shrink-0">
            <div class="flex items-center space-x-2">
                <!-- Icon Scan -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 7v10"/><path d="M12 7v10"/><path d="M16 7v10"/></svg>
                <h1 class="text-xl font-bold tracking-wide">ระบบยิงพัสดุ</h1>
            </div>
            <button id="toggleSettingsBtn" class="p-2 bg-blue-700 hover:bg-blue-800 rounded-full transition-colors focus:outline-none">
                <!-- Icon Settings -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="p-4 bg-blue-50 border-b border-blue-100 hidden-panel shrink-0">
            <label class="block text-sm font-semibold text-blue-900 mb-2">
                Google Apps Script URL (ตั้งค่าครั้งแรก)
            </label>
            <input type="text" id="apiUrlInput" placeholder="https://script.google.com/macros/s/..." class="w-full p-2 border border-blue-200 rounded-lg mb-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
            <button id="saveSettingsBtn" class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition">
                บันทึก URL
            </button>
        </div>

        <!-- Main Content -->
        <div class="p-6 flex-1 flex flex-col overflow-hidden">
            
            <!-- Input Section -->
            <div class="mb-4 shrink-0">
                <label class="block text-gray-700 text-sm font-bold mb-2">
                    ยิงบาร์โค้ด / กรอกเลขพัสดุ
                </label>
                <!-- ปรับช่อง input ให้เล็กลงเล็กน้อยเพื่อประหยัดพื้นที่ -->
                <input type="text" id="barcodeInput" placeholder="สแกนบาร์โค้ดที่นี่..." class="w-full p-3 text-lg border-2 border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all text-center uppercase tracking-wider font-mono" />
            </div>

            <!-- Display Scanned Data List -->
            <div class="mb-4 flex-1 flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-2 px-1 shrink-0">
                    <span class="text-sm font-bold text-gray-700">รายการที่เตรียมบันทึก</span>
                    <span id="listCountBadge" class="text-xs font-bold text-blue-700 bg-blue-100 px-2 py-1 rounded-full hidden">0 รายการ</span>
                </div>
                
                <!-- Scrollable List Container -->
                <div class="flex-1 overflow-y-auto custom-scrollbar bg-gray-100 rounded-xl p-2 border border-gray-200 relative">
                    <div id="scannedDataDisplay" class="flex flex-col space-y-2 min-h-full">
                        <!-- Default empty state -->
                        <div class="m-auto text-gray-400 italic flex items-center justify-center h-full w-full text-sm">
                            ยังไม่มีข้อมูล
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="saveDataBtn" disabled class="w-full py-3 rounded-xl flex items-center justify-center space-x-2 text-lg font-bold shadow-lg transition-all bg-gray-300 text-gray-500 cursor-not-allowed shrink-0">
                <!-- Icon Save (Default) -->
                <svg id="saveIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                
                <span id="btnText">บันทึกข้อมูล</span>
            </button>

            <!-- Status Messages -->
            <div id="statusMessage" class="mt-3 p-2 rounded-lg flex items-center space-x-2 text-xs hidden-panel font-medium shrink-0">
                <!-- Icon container will be injected here via JS -->
                <span id="statusText"></span>
            </div>

        </div>
    </div>

    <!-- Javascript Logic -->
    <script>
        // Array เพื่อเก็บรายการทั้งหมดที่สแกน
        let scannedList = [];
        
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const barcodeInput = document.getElementById('barcodeInput');
            const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
            const settingsPanel = document.getElementById('settingsPanel');
            const apiUrlInput = document.getElementById('apiUrlInput');
            const saveSettingsBtn = document.getElementById('saveSettingsBtn');
            const scannedDataDisplay = document.getElementById('scannedDataDisplay');
            const listCountBadge = document.getElementById('listCountBadge');
            const saveDataBtn = document.getElementById('saveDataBtn');
            const btnText = document.getElementById('btnText');
            const statusMessage = document.getElementById('statusMessage');
            const statusText = document.getElementById('statusText');

            // State variables
            let apiUrl = localStorage.getItem('googleSheetApiUrl') || '';
            let statusTimeout = null;

            // Initialize API URL input
            if (apiUrl) {
                apiUrlInput.value = apiUrl;
            }

            // Always focus input on load
            barcodeInput.focus();

            // Toggle Settings Panel
            toggleSettingsBtn.addEventListener('click', () => {
                if (settingsPanel.style.display === 'block') {
                    settingsPanel.style.display = 'none';
                    barcodeInput.focus();
                } else {
                    settingsPanel.style.display = 'block';
                }
            });

            // Save Settings
            saveSettingsBtn.addEventListener('click', () => {
                apiUrl = apiUrlInput.value.trim();
                localStorage.setItem('googleSheetApiUrl', apiUrl);
                settingsPanel.style.display = 'none';
                showStatus('success', 'บันทึก URL สำเร็จ');
                barcodeInput.focus();
            });

            // Handle Barcode Scanner Input (Enter Key)
            barcodeInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = barcodeInput.value.trim();
                    if (val !== '') {
                        // นำข้อมูลใหม่ไว้ด้านบนสุดของรายการ
                        scannedList.unshift(val);
                        barcodeInput.value = ''; // clear input
                        updateDisplay();
                    }
                }
            });

            // ฟังก์ชันลบรายการเมื่อกดปุ่มถังขยะ
            window.removeScannedItem = function(index) {
                scannedList.splice(index, 1);
                updateDisplay();
                barcodeInput.focus();
            };

            // Update UI based on scanned list
            function updateDisplay() {
                if (scannedList.length > 0) {
                    // อัปเดตตัวเลขจำนวน
                    listCountBadge.style.display = 'inline-block';
                    listCountBadge.innerText = `${scannedList.length} รายการ`;
                    
                    // สร้าง HTML สำหรับรายการ
                    let html = '';
                    scannedList.forEach((item, index) => {
                        html += `
                            <div class="flex justify-between items-center bg-white p-2 rounded-lg border border-gray-200 shadow-sm transition-all hover:border-blue-300">
                                <span class="text-sm font-semibold text-gray-800 tracking-wider break-all mr-2 pl-2">${item}</span>
                                <button onclick="removeScannedItem(${index})" class="p-1.5 text-red-500 bg-red-50 hover:bg-red-500 hover:text-white rounded-lg transition-colors shrink-0 outline-none" title="ลบรายการนี้">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                                </button>
                            </div>
                        `;
                    });
                    
                    scannedDataDisplay.innerHTML = html;
                    
                    // เปิดปุ่มบันทึก
                    saveDataBtn.disabled = false;
                    saveDataBtn.className = "w-full py-3 rounded-xl flex items-center justify-center space-x-2 text-lg font-bold shadow-lg transition-all bg-green-600 hover:bg-green-700 text-white active:scale-95 shrink-0";
                    btnText.innerText = `บันทึกข้อมูล (${scannedList.length})`;
                } else {
                    // หากไม่มีข้อมูล
                    listCountBadge.style.display = 'none';
                    scannedDataDisplay.innerHTML = `<div class="m-auto text-gray-400 italic flex items-center justify-center h-full w-full text-sm">ยังไม่มีข้อมูล</div>`;
                    
                    // ปิดปุ่มบันทึก
                    saveDataBtn.disabled = true;
                    saveDataBtn.className = "w-full py-3 rounded-xl flex items-center justify-center space-x-2 text-lg font-bold shadow-lg transition-all bg-gray-300 text-gray-500 cursor-not-allowed shrink-0";
                    btnText.innerText = 'บันทึกข้อมูล';
                }
            }

            // Show status messages
            function showStatus(type, message) {
                clearTimeout(statusTimeout);
                statusMessage.style.display = 'flex';
                statusText.innerText = message;
                
                if (type === 'success') {
                    statusMessage.className = "mt-3 p-2 bg-green-100 text-green-800 rounded-lg flex items-center space-x-2 text-xs font-medium animate-pulse shrink-0";
                    statusMessage.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600 shrink-0"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                        <span>${message}</span>
                    `;
                } else {
                    statusMessage.className = "mt-3 p-2 bg-red-100 text-red-800 rounded-lg flex items-center space-x-2 text-xs font-medium shrink-0";
                    statusMessage.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-red-600 shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <span>${message}</span>
                    `;
                }

                statusTimeout = setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, 4000);
            }

            // Save Data to Google Sheet (แบบไม่บล็อกหน้าจอ)
            saveDataBtn.addEventListener('click', () => {
                if (scannedList.length === 0) return;

                if (!apiUrl) {
                    showStatus('error', 'กรุณาตั้งค่า Google Web App URL ที่เมนูฟันเฟืองก่อน');
                    settingsPanel.style.display = 'block';
                    return;
                }

                const totalItemsToSave = scannedList.length;
                // คัดลอกข้อมูลรายการทั้งหมดเก็บไว้ก่อนเพื่อส่ง API
                const itemsToSave = [...scannedList];

                // 1. ส่ง Request ไปทำงานอยู่เบื้องหลังทันที
                const fetchPromises = itemsToSave.map(item => {
                    return fetch(apiUrl, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: JSON.stringify({ trackingNumber: item }),
                    });
                });

                Promise.all(fetchPromises)
                    .then(() => console.log(`ส่งข้อมูล ${totalItemsToSave} รายการเบื้องหลังสำเร็จ`))
                    .catch(error => console.error("Error saving data:", error));

                // 2. เคลียร์รายการและหน้าจอทันที ไม่ต้องรอ API
                scannedList = []; 
                updateDisplay();
                barcodeInput.focus();
                
                // 3. แสดงข้อความแจ้งเตือนว่าส่งข้อมูลแล้ว
                showStatus('success', `ส่ง ${totalItemsToSave} รายการไปบันทึกเรียบร้อย!`);
            });
        });
    </script>
</body>
</html>
